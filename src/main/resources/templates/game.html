<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::content})}">

<section th:fragment="content">
  <header class="page-header">
    <h1>Partida</h1>
    <p th:text="|Partida iniciada vs Bot (${nivel})|">Partida iniciada vs Bot (nivel)</p>
  </header>

  <div class="game">
    <div class="board" aria-label="Tablero de ajedrez 8x8 (sin piezas)">
      <div th:each="i : ${#numbers.sequence(0,63)}"
           class="square"
           th:classappend="${((i/8 + i%8) % 2) == 0} ? ' square--light' : ' square--dark'">
      </div>
    </div>

    <aside class="panel">
      <h3>Info</h3>
      <div class="panel-row"><span class="muted">Bot:</span> <strong>Bot</strong> (<span th:text="${nivel}">nivel</span>)</div>
      <div class="panel-row"><span class="muted">Jugador:</span> <strong>Diego A</strong></div>
      <div class="panel-row"><span class="muted">Turno:</span> <strong id="turnIndicator">Blancas</strong></div>
      <p class="muted" style="margin-top:12px;">Sin lógica: no hay piezas ni movimientos.</p>

      <a class="btn" th:href="@{/jugar/bots}">Cambiar nivel</a>
    </aside>
  </div>
</section>

</html>
