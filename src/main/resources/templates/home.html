<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::content})}">

<head>
  <title>Jugar - Chess UI</title>
  <!-- Fuente Alexandria -->
  <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- CSS específico de jugar -->
  <link rel="stylesheet" th:href="@{/css/jugar.css}" href="/css/jugar.css">
</head>

<section th:fragment="content" class="jugar-page">
  
  <div class="jugar-layout">
    
    <!-- Tablero de Ajedrez (IZQUIERDA) -->
    <div class="tablero-wrapper">
      <div class="tablero-jugar" aria-label="Tablero de ajedrez">
        <img th:src="@{/images/tablero-ajedrez-jugar.svg}" 
             src="/images/tablero-ajedrez-jugar.svg" 
             alt="Tablero de ajedrez con piezas"
             draggable="false"
             ondragstart="return false;">
      </div>
    </div>

    <!-- Panel de Opciones (DERECHA) - CONTENEDOR CON FONDO -->
    <div class="panel-opciones" id="panelOpciones">
      
      <!-- Jugar contra Bots -->
      <a th:href="@{/jugar/bots}" href="/jugar/bots" class="btn-opcion" data-opcion="bots">
        <span class="btn-icono">
          <img th:src="@{/images/icons/icono-bot.svg}" 
               src="/images/icons/icono-bot.svg" 
               alt=""
               draggable="false"
               ondragstart="return false;">
        </span>
        <span>Jugar contra Bots</span>
      </a>

      <!-- Jugar con un Maestro -->
      <a th:href="@{/jugar/maestro}" href="/jugar/maestro" class="btn-opcion" data-opcion="maestro">
        <span class="btn-icono">
          <img th:src="@{/images/icons/icono-maestro.svg}" 
               src="/images/icons/icono-maestro.svg" 
               alt=""
               draggable="false"
               ondragstart="return false;">
        </span>
        <span>Jugar con un Maestro</span>
      </a>

      <!-- Jugar con un Amigo -->
      <a th:href="@{/jugar/amigo}" href="/jugar/amigo" class="btn-opcion" data-opcion="amigo">
        <span class="btn-icono">
          <img th:src="@{/images/icons/icono-amigo.svg}" 
               src="/images/icons/icono-amigo.svg" 
               alt=""
               draggable="false"
               ondragstart="return false;">
        </span>
        <span>Jugar con un Amigo</span>
      </a>

    </div>
  </div>

  <!-- Script para efecto de opacidad -->
  <script>
    (function() {
      const panel = document.getElementById('panelOpciones');
      if (!panel) return;
      
      const botones = panel.querySelectorAll('.btn-opcion');
      
      botones.forEach(boton => {
        boton.addEventListener('mouseenter', function() {
          botones.forEach(b => {
            if (b === this) {
              b.style.background = 'rgba(89, 78, 72, 1)';
            } else {
              b.style.background = 'rgba(89, 78, 72, 0.5)';
            }
          });
        });
        
        boton.addEventListener('mouseleave', function() {
          botones.forEach(b => {
            b.style.background = 'rgba(89, 78, 72, 0.5)';
          });
        });
      });
    })();
  </script>
</section>

</html>
